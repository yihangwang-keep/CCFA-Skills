<svg width="1440" height="940" viewBox="0 0 1440 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CCFA 评审边界架构</title>
  <desc id="desc">CCFA 思路评审、完整科学审稿、写作评审和显式 rebuttal 模块的边界图。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#9a3412" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .font{font-family:"Microsoft YaHei","Noto Sans SC","Inter","Segoe UI",Arial,sans-serif}
      .title{font-size:34px;font-weight:800;fill:#0f172a}
      .sub{font-size:15px;fill:#475569}
      .h{font-size:16px;font-weight:800}
      .b{font-size:12px;fill:#334155}
      .s{font-size:11px;fill:#64748b}
      .skill{font-size:12px;font-weight:800}
      .label{font-size:12px;font-weight:800;fill:#0f172a}
    </style>
  </defs>

  <rect width="1440" height="940" rx="28" fill="#f8fafc"/>
  <rect x="40" y="34" width="1360" height="858" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="720" y="78" text-anchor="middle" class="font title">评审 / Reviewer 边界图</text>
  <text x="720" y="108" text-anchor="middle" class="font sub">明确拆分 idea 评分、完整科学审稿、写作评审和 rebuttal，避免泛泛 AI 式审稿</text>

  <rect x="82" y="148" width="1276" height="86" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="110" y="180" class="font label">路由规则</text>
  <text x="236" y="180" class="font b">审稿这篇论文 / 完整审稿 / 模拟审稿人 / AC meta-review / 论文评分 -> `ccf-conference-reviewer`</text>
  <text x="236" y="205" class="font b">逐段写作评审 / LaTeX / 行文逻辑 / 全文一致性 -> `ccf-conference-writing-reviewer`；idea 评分/排名 -> `ccf-idea-reviewer`；rebuttal -> 仅显式触发</text>

  <g filter="url(#shadow)">
    <rect x="82" y="278" width="286" height="432" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="225" y="314" text-anchor="middle" class="font h" fill="#4c1d95">思路评审</text>
    <text x="225" y="338" text-anchor="middle" class="font skill" fill="#5b21b6">ccf-idea-reviewer</text>
    <line x1="110" y1="358" x2="340" y2="358" stroke="#c4b5fd"/>
    <text x="110" y="388" class="font label">启动条件</text>
    <text x="110" y="412" class="font b">用户明确要求 idea 评分、选题评分、</text>
    <text x="110" y="432" class="font b">排名、选择、严格锐评、是否值得做。</text>
    <text x="110" y="470" class="font label">负责</text>
    <text x="110" y="494" class="font b">早期 idea 的 novelty、insight、</text>
    <text x="110" y="514" class="font b">method soundness、feasibility、venue fit。</text>
    <text x="110" y="552" class="font label">不负责</text>
    <text x="110" y="576" class="font b">具象化模糊 idea、论文全文审稿、</text>
    <text x="110" y="596" class="font b">写作 / LaTeX 审查或 rebuttal。</text>
    <text x="110" y="634" class="font label">输出</text>
    <text x="110" y="658" class="font b">分数、排序、最接近工作风险、</text>
    <text x="110" y="678" class="font b">会改变判断的证据。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="278" width="326" height="432" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="573" y="314" text-anchor="middle" class="font h" fill="#0c4a6e">完整科学审稿</text>
    <text x="573" y="338" text-anchor="middle" class="font skill" fill="#075985">ccf-conference-reviewer</text>
    <line x1="438" y1="358" x2="708" y2="358" stroke="#7dd3fc"/>
    <text x="438" y="388" class="font label">启动条件</text>
    <text x="438" y="412" class="font b">完整审稿、模拟审稿人、AC/meta-review、</text>
    <text x="438" y="432" class="font b">论文评分、桌面拒稿风险、接收风险。</text>
    <text x="438" y="470" class="font label">负责</text>
    <text x="438" y="494" class="font b">桌面检查、公开安全相关工作检索、</text>
    <text x="438" y="514" class="font b">新颖性/可靠性/证据、实验/复现审计、</text>
    <text x="438" y="534" class="font b">多审稿人小组、AC 综合意见、分数。</text>
    <text x="438" y="572" class="font label">不负责</text>
    <text x="438" y="596" class="font b">直接改写全文、纯 LaTeX 审查、作者回应。</text>
    <text x="438" y="634" class="font label">标准输出</text>
    <text x="438" y="658" class="font b">固定格式 Markdown 审稿报告、问题表、</text>
    <text x="438" y="678" class="font b">分数调整条件、交接动作。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="778" y="278" width="286" height="432" rx="8" fill="#ecfeff" stroke="#0891b2"/>
    <text x="921" y="314" text-anchor="middle" class="font h" fill="#164e63">写作评审</text>
    <text x="921" y="338" text-anchor="middle" class="font skill" fill="#0e7490">ccf-conference-writing-reviewer</text>
    <line x1="806" y1="358" x2="1036" y2="358" stroke="#67e8f9"/>
    <text x="806" y="388" class="font label">启动条件</text>
    <text x="806" y="412" class="font b">写作评审、逐段写作评审、LaTeX、</text>
    <text x="806" y="432" class="font b">格式、行文逻辑、全文一致性。</text>
    <text x="806" y="470" class="font label">负责</text>
    <text x="806" y="494" class="font b">段落 ID、故事线、主张-证据</text>
    <text x="806" y="514" class="font b">呈现、术语、图表叙述、</text>
    <text x="806" y="534" class="font b">LaTeX / 模板 / 引用检查。</text>
    <text x="806" y="572" class="font label">不负责</text>
    <text x="806" y="596" class="font b">科学新颖性裁决、接收式评分、</text>
    <text x="806" y="616" class="font b">AC/meta-review 或 审稿人模拟。</text>
    <text x="806" y="654" class="font label">输出</text>
    <text x="806" y="678" class="font b">逐段问题表、具体改写动作、格式风险。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1106" y="278" width="252" height="432" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <text x="1232" y="314" text-anchor="middle" class="font h" fill="#9a3412">Rebuttal</text>
    <text x="1232" y="338" text-anchor="middle" class="font skill" fill="#9a3412">ccf-conference-paper-rebuttal</text>
    <line x1="1134" y1="358" x2="1330" y2="358" stroke="#fdba74"/>
    <text x="1134" y="388" class="font label">启动条件</text>
    <text x="1134" y="412" class="font b">真实审稿意见 + 用户明确要求</text>
    <text x="1134" y="432" class="font b">rebuttal / 作者回应 / response letter。</text>
    <text x="1134" y="470" class="font label">负责</text>
    <text x="1134" y="494" class="font b">回应策略、语气、承诺控制、</text>
    <text x="1134" y="514" class="font b">AC/R1/R2 映射、TeX 回应文件。</text>
    <text x="1134" y="552" class="font label">不负责</text>
    <text x="1134" y="576" class="font b">投稿前闭环中的普通评审。</text>
    <text x="1134" y="614" class="font label">输出</text>
    <text x="1134" y="638" class="font b">作者回应、修改承诺、补充实验占位。</text>
  </g>

  <path d="M368 494H398" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="383" y="480" text-anchor="middle" class="font s">已有草稿</text>
  <path d="M736 494H766" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="751" y="480" text-anchor="middle" class="font s">写作细查</text>
  <path d="M1064 494H1094" stroke="#9a3412" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrowOrange)"/>
  <text x="1079" y="480" text-anchor="middle" class="font s" fill="#9a3412">真实审稿意见</text>

  <rect x="82" y="766" width="1276" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="110" y="796" class="font label">反空话约束</text>
  <text x="270" y="796" class="font b">每个问题必须指向具体主张、段落、章节、图表、实验、closest prior work 或缺失证据路径。</text>
  <text x="270" y="820" class="font b">不得编造引用、结果、审稿人共识、分数变化、基准排名或接收概率。</text>

  <rect x="82" y="858" width="1276" height="36" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="720" y="881" text-anchor="middle" class="font s">边界快照：评审 skills 是专门模块；跨模块移动遵循 ccf-common 的 PARTIAL handoff 和用户 denylist。</text>
</svg>
