<svg width="1500" height="1120" viewBox="0 0 1500 1120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CCFA Skills 逐步工作流</title>
  <desc id="desc">CCFA Skills 逐步工作流，展示输入、路由门控、skill 负责模块、输出、修复回路和显式 rebuttal 分支。</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .font{font-family:"Microsoft YaHei","Noto Sans SC","Inter","Segoe UI",Arial,sans-serif}
      .title{font-size:34px;font-weight:800;fill:#0f172a}
      .sub{font-size:15px;fill:#475569}
      .num{font-size:16px;font-weight:900;fill:#ffffff}
      .h{font-size:15px;font-weight:800;fill:#0f172a}
      .b{font-size:12px;fill:#334155}
      .s{font-size:11px;fill:#64748b}
      .skill{font-size:11px;font-weight:800;fill:#1e293b}
    </style>
  </defs>

  <rect width="1500" height="1120" rx="28" fill="#f8fafc"/>
  <rect x="42" y="34" width="1416" height="1048" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="750" y="78" text-anchor="middle" class="font title">CCFA 逐步研究工作流</text>
  <text x="750" y="108" text-anchor="middle" class="font sub">每一步都有唯一负责模块；只有跨阶段、敏感联网、正式审稿/rebuttal 或可复用文件才触发 PARTIAL handoff 询问</text>

  <g filter="url(#shadow)">
    <rect x="74" y="150" width="236" height="104" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="104" cy="180" r="18" fill="#475569"/>
    <text x="104" y="186" text-anchor="middle" class="font num">0</text>
    <text x="132" y="176" class="font h">请求接收</text>
    <text x="92" y="206" class="font b">输入：idea、论文、审稿意见、</text>
    <text x="92" y="224" class="font b">实验目标或维护请求</text>
    <text x="92" y="242" class="font skill">owner：路由规则</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M452 150L572 202L452 254L332 202Z" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="452" y="188" text-anchor="middle" class="font h" fill="#78350f">是否模糊？</text>
    <text x="452" y="210" text-anchor="middle" class="font b" fill="#92400e">复杂 / 多阶段 / 先讨论</text>
    <text x="452" y="230" text-anchor="middle" class="font skill" fill="#92400e">ccf-brainstorming</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="150" width="256" height="104" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <circle cx="650" cy="180" r="18" fill="#f59e0b"/>
    <text x="650" y="186" text-anchor="middle" class="font num">1</text>
    <text x="678" y="176" class="font h">研究任务摘要</text>
    <text x="638" y="206" class="font b">输出：目标、约束、成功标准、</text>
    <text x="638" y="224" class="font b">材料清单、下一步 skill</text>
    <text x="638" y="242" class="font skill">standard：决策摘要</text>
  </g>

  <path d="M310 202H328" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M572 202H608" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="74" y="320" width="238" height="126" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <circle cx="104" cy="350" r="18" fill="#2563eb"/>
    <text x="104" y="356" text-anchor="middle" class="font num">2</text>
    <text x="132" y="346" class="font h" fill="#1e3a8a">思路成形</text>
    <text x="92" y="376" class="font b" fill="#1d4ed8">模糊 idea -> 问题 / 缺口 /</text>
    <text x="92" y="394" class="font b" fill="#1d4ed8">洞察 / 方法 / 证据计划</text>
    <text x="92" y="416" class="font skill" fill="#1e40af">ccf-idea-optimizer</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M452 318L572 383L452 448L332 383Z" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="452" y="366" text-anchor="middle" class="font h" fill="#4c1d95">是否评分 / 排名？</text>
    <text x="452" y="389" text-anchor="middle" class="font b" fill="#6d28d9">显式要求评分 / 排名 /</text>
    <text x="452" y="407" text-anchor="middle" class="font b" fill="#6d28d9">选择或严格锐评</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="320" width="256" height="126" rx="8" fill="#f5f3ff" stroke="#7c3aed"/>
    <circle cx="650" cy="350" r="18" fill="#7c3aed"/>
    <text x="650" y="356" text-anchor="middle" class="font num">3</text>
    <text x="678" y="346" class="font h" fill="#4c1d95">思路评审门控</text>
    <text x="638" y="376" class="font b" fill="#6d28d9">联网查最接近工作；按洞察、</text>
    <text x="638" y="394" class="font b" fill="#6d28d9">创新性、方法、可行性打分</text>
    <text x="638" y="416" class="font skill" fill="#5b21b6">ccf-idea-reviewer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="946" y="320" width="256" height="126" rx="8" fill="#ccfbf1" stroke="#0f766e"/>
    <circle cx="976" cy="350" r="18" fill="#0f766e"/>
    <text x="976" y="356" text-anchor="middle" class="font num">4</text>
    <text x="1004" y="346" class="font h" fill="#134e4a">文献支撑</text>
    <text x="964" y="376" class="font b" fill="#0f766e">相关工作、基准、数据集，</text>
    <text x="964" y="394" class="font b" fill="#0f766e">评分并标注文章类型</text>
    <text x="964" y="416" class="font skill" fill="#115e59">ccf-literature-search</text>
  </g>

  <path d="M312 383H330" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M572 383H608" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M876 383H934" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M452 448C512 496 842 496 1018 446" stroke="#64748b" stroke-width="2" stroke-dasharray="7 7" fill="none" marker-end="url(#arrowMuted)"/>
  <text x="720" y="490" text-anchor="middle" class="font s">无显式评分 -> 跳过 idea reviewer，按需进入证据支撑</text>

  <g filter="url(#shadow)">
    <rect x="74" y="586" width="256" height="126" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <circle cx="104" cy="616" r="18" fill="#16a34a"/>
    <text x="104" y="622" text-anchor="middle" class="font num">5</text>
    <text x="132" y="612" class="font h" fill="#14532d">实验设计</text>
    <text x="92" y="642" class="font b" fill="#15803d">数据集 / 基线 / 消融 / 鲁棒性</text>
    <text x="92" y="660" class="font b" fill="#15803d">结果表只给空表，不编数字</text>
    <text x="92" y="682" class="font skill" fill="#166534">ccf-experiment-designer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="586" width="256" height="126" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="410" cy="616" r="18" fill="#ef4444"/>
    <text x="410" y="622" text-anchor="middle" class="font num">6</text>
    <text x="438" y="612" class="font h" fill="#7f1d1d">论文写作</text>
    <text x="398" y="642" class="font b" fill="#991b1b">摘要 / 引言 / 相关工作 /</text>
    <text x="398" y="660" class="font b" fill="#991b1b">方法 / 实验 / 故事线</text>
    <text x="398" y="682" class="font skill" fill="#991b1b">ccf-writing-skills</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="686" y="586" width="256" height="126" rx="8" fill="#fce7f3" stroke="#db2777"/>
    <circle cx="716" cy="616" r="18" fill="#db2777"/>
    <text x="716" y="622" text-anchor="middle" class="font num">7</text>
    <text x="744" y="612" class="font h" fill="#831843">篇幅压缩</text>
    <text x="704" y="642" class="font b" fill="#9d174d">按故事线保留主张、证据、限制；</text>
    <text x="704" y="660" class="font b" fill="#9d174d">附录 / 删除前询问一次</text>
    <text x="704" y="682" class="font skill" fill="#9d174d">ccf-paper-compressor</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="992" y="586" width="300" height="126" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <circle cx="1022" cy="616" r="18" fill="#0284c7"/>
    <text x="1022" y="622" text-anchor="middle" class="font num">8</text>
    <text x="1050" y="612" class="font h" fill="#0c4a6e">完整科学审稿</text>
    <text x="1010" y="642" class="font b" fill="#075985">desk check / related work / claim-evidence /</text>
    <text x="1010" y="660" class="font b" fill="#075985">实验审计 / 审稿人 / AC / 分数</text>
    <text x="1010" y="682" class="font skill" fill="#075985">ccf-conference-reviewer</text>
  </g>

  <path d="M1202 383C1264 444 1198 530 1142 586" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M330 649H368" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M636 649H674" stroke="#64748b" stroke-width="2.1" stroke-dasharray="7 7" marker-end="url(#arrowMuted)"/>
  <path d="M942 649H980" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="164" y="838" width="318" height="120" rx="8" fill="#ecfeff" stroke="#0891b2"/>
    <circle cx="194" cy="868" r="18" fill="#0891b2"/>
    <text x="194" y="874" text-anchor="middle" class="font num">9</text>
    <text x="222" y="864" class="font h" fill="#164e63">写作 / LaTeX 细查</text>
    <text x="182" y="894" class="font b" fill="#0e7490">逐段写作、格式、LaTeX、图表叙述；</text>
    <text x="182" y="912" class="font b" fill="#0e7490">全文一致性；不做科学评分</text>
    <text x="182" y="936" class="font skill" fill="#0e7490">ccf-conference-writing-reviewer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="592" y="838" width="318" height="120" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <circle cx="622" cy="868" r="18" fill="#64748b"/>
    <text x="622" y="874" text-anchor="middle" class="font num">10</text>
    <text x="650" y="864" class="font h">行动队列</text>
    <text x="610" y="894" class="font b">按严重度分流：补文献、补实验、</text>
    <text x="610" y="912" class="font b">改写、压缩、重构 idea、接受限制</text>
    <text x="610" y="936" class="font skill">通过 ccf-common handoff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="838" width="318" height="120" rx="8" fill="#fff7ed" stroke="#f97316"/>
    <circle cx="1050" cy="868" r="18" fill="#f97316"/>
    <text x="1050" y="874" text-anchor="middle" class="font num">11</text>
    <text x="1078" y="864" class="font h" fill="#9a3412">仅显式 Rebuttal</text>
    <text x="1038" y="894" class="font b" fill="#9a3412">真实审稿意见 + 用户明确要求回应；</text>
    <text x="1038" y="912" class="font b" fill="#9a3412">不在投稿前闭环中自动出现</text>
    <text x="1038" y="936" class="font skill" fill="#9a3412">ccf-conference-paper-rebuttal</text>
  </g>

  <path d="M1142 712C1116 790 430 790 323 838" stroke="#64748b" stroke-width="2.1" stroke-dasharray="7 7" fill="none" marker-end="url(#arrowMuted)"/>
  <path d="M1142 712C1074 782 836 780 751 838" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M910 898H1008" stroke="#9a3412" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="965" y="882" class="font s" fill="#9a3412">仅真实审稿意见 + 显式回应请求</text>

  <rect x="74" y="1000" width="1352" height="62" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="100" y="1026" class="font h">模式与安全覆盖</text>
  <text x="100" y="1048" class="font b">quick：局部修改 / 短扫描 / 不强制完整 checklist。standard：完整检索、整篇审稿、实验方案、可复用文件。始终：不编造引用/结果，使用公开安全检索，排除 MDPI，分数风险不等于接收概率。</text>
</svg>
