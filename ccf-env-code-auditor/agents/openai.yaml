interface:
  display_name: "CCF Environment Code Auditor"
  short_description: "Audit environment-to-document fidelity and scientific tradeoffs"
  default_prompt: "Use $ccf-env-code-auditor to map the scientific-problem document to environment code, check whether the implementation represents the core problem and tradeoff, and use labelled heuristic or seeded-random probes to verify that generic choices do not trivially achieve both competing goals. Do not require a complete algorithm or scenario run."
