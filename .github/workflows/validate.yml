name: validate

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pyyaml
      - run: python ccf-common/scripts/check_path_privacy.py .
      - run: python ccf-common/scripts/check_sources.py
      - run: python ccf-common/scripts/check_markdown_links.py
      - run: python ccf-common/scripts/check_v04.py
