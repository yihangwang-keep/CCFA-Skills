schema_version: 2
generated_at: 2026-06-06
authority: SKILL.md wins if this registry conflicts with a skill body.
naming_policy: canonical names use ccf-<object>-<role/action>; ccf-common is the governance exception.
skills:
  - name: ccf-project-scaffolder
    trigger: "Creates project folders, copies/selects templates, and initializes ccfa.yaml."
    exclude: "Does not create research content."
    handoff: "ccf-pipeline-orchestrator, ccf-paper-writer, ccf-submission-checker"
  - name: ccf-pipeline-orchestrator
    trigger: "Coordinates project stages, gates, artifacts, and handoffs."
    exclude: "Does not do downstream work itself."
    handoff: "All owning skills"
  - name: ccf-workflow-planner
    trigger: "Clarifies goals, constraints, scope, success criteria, and next skill."
    exclude: "Does not optimize, search, write, review, or rebut."
    handoff: "Most CCFA skills"
  - name: ccf-idea-optimizer
    trigger: "Turns rough directions into problem-gap-insight-method-evidence plans."
    exclude: "Does not rank ideas as the main task."
    handoff: "ccf-literature-searcher, ccf-experiment-designer, ccf-paper-writer"
  - name: ccf-idea-reviewer
    trigger: "Scores, ranks, compares, and triages early ideas."
    exclude: "Does not polish manuscripts."
    handoff: "ccf-literature-searcher, ccf-idea-optimizer"
  - name: ccf-literature-searcher
    trigger: "Finds related work, prior art, datasets, benchmarks, and citation evidence."
    exclude: "Does not audit only fixed citations."
    handoff: "ccf-idea-optimizer, ccf-experiment-designer, ccf-paper-writer"
  - name: ccf-experiment-designer
    trigger: "Designs datasets, baselines, metrics, ablations, robustness tests, and result templates."
    exclude: "Does not invent results."
    handoff: "ccf-literature-searcher, ccf-figure-table-builder, ccf-paper-writer"
  - name: ccf-paper-writer
    trigger: "Plans, drafts, revises, and polishes manuscript text while preserving evidence scope."
    exclude: "Does not perform full review or rebuttal."
    handoff: "ccf-venue-format-guide, ccf-paper-compressor, ccf-writing-reviewer"
  - name: ccf-paper-compressor
    trigger: "Shortens paper text to word/page limits without changing claims or results."
    exclude: "Does not change evidence or limitations."
    handoff: "ccf-paper-writer, ccf-submission-checker"
  - name: ccf-scientific-reviewer
    trigger: "Runs full scientific manuscript review, scoring, simulated reviewers, and AC/meta-review."
    exclude: "Does not rewrite prose or do format-only checks."
    handoff: "ccf-paper-writer, ccf-writing-reviewer, ccf-experiment-designer"
  - name: ccf-writing-reviewer
    trigger: "Reviews paragraph logic, writing clarity, consistency, LaTeX/format, and presentation risks."
    exclude: "Does not score scientific acceptance."
    handoff: "ccf-paper-writer, ccf-venue-format-guide, ccf-submission-checker"
  - name: ccf-integrity-auditor
    trigger: "Audits claim-support, result-to-claim, numeric, terminology, and figure/table consistency."
    exclude: "Does not replace scientific review."
    handoff: "ccf-paper-writer, ccf-scientific-reviewer, ccf-citation-auditor"
  - name: ccf-citation-auditor
    trigger: "Verifies existing citations, BibTeX metadata, paper existence, and citation-context support."
    exclude: "Does not search broadly for new papers."
    handoff: "ccf-literature-searcher, ccf-paper-writer"
  - name: ccf-figure-table-builder
    trigger: "Builds and audits figures, LaTeX tables, captions, SVG/PDF assets from real results."
    exclude: "Does not invent numbers."
    handoff: "ccf-experiment-designer, ccf-paper-writer, ccf-integrity-auditor"
  - name: ccf-artifact-packager
    trigger: "Prepares artifact and reproducibility package plans, env notes, seeds, licenses, and README."
    exclude: "Does not promise unavailable releases."
    handoff: "ccf-experiment-designer, ccf-submission-checker, ccf-paper-writer"
  - name: ccf-venue-format-guide
    trigger: "Answers venue LaTeX, template, page-limit, anonymity, and camera-ready format questions."
    exclude: "Does not handle manuscript content."
    handoff: "ccf-paper-writer, ccf-writing-reviewer, ccf-submission-checker"
  - name: ccf-submission-checker
    trigger: "Checks LaTeX/PDF builds, page limits, anonymity, fonts, metadata, templates, and policy freshness."
    exclude: "Does not polish content."
    handoff: "ccf-venue-format-guide, ccf-paper-compressor, ccf-paper-writer"
  - name: ccf-rebuttal-writer
    trigger: "Writes rebuttals, author responses, response letters, revision summaries, and revision ledgers."
    exclude: "Does not trigger for ordinary writing."
    handoff: "ccf-paper-writer, ccf-experiment-designer, ccf-submission-checker"
  - name: ccf-resubmission-adapter
    trigger: "Adapts an existing paper to a new venue under conservative no-new-experiment defaults."
    exclude: "Does not add experiments or bibliography changes unless authorized."
    handoff: "ccf-venue-format-guide, ccf-paper-writer, ccf-submission-checker"
  - name: ccf-paper-presenter
    trigger: "Converts a paper into slides, poster, talk script, figure narration, and Q&A bank."
    exclude: "Does not perform pre-submission review."
    handoff: "ccf-paper-writer"
  - name: ccf-common
    trigger: "Shared routing, trigger registry, handoff modes, source registry, privacy policy, and artifact contracts."
    exclude: "Not an ordinary research task skill."
    handoff: "All CCFA skills"
  - name: ccf-skill-forger
    trigger: "Creates, updates, validates, and audits CCFA/Codex skills and family governance."
    exclude: "Does not do research writing or review."
    handoff: "ccf-common"
