schema_version: 4
generated_at: 2026-07-18
authority: SKILL.md wins if this registry conflicts with a skill body.
naming_policy: canonical runtime names use ccf-<object>-<role/action>; ccf-common is the governance exception.
runtime_skill_count: 19
skills:
  - name: ccf-project-scaffolder
    trigger: "Create project folders, copy/select templates, initialize ccfa.yaml."
    exclude: "Does not create research content."
    handoff: "ccf-pipeline-orchestrator, ccf-paper-writer, ccf-submission-checker"
  - name: ccf-pipeline-orchestrator
    trigger: "Plan workflow, coordinate stages/gates/artifacts/handoffs and ccfa.yaml state, or create a post-acceptance conclusion-evidence plan with baselines, metrics, ablations, robustness, and TBD result slots."
    exclude: "Does not implement or audit phase code, invent results, draw publication visuals, write manuscript prose, or rebut."
    handoff: "All owning workflow skills"
  - name: ccf-idea-optimizer
    trigger: "Explore, rescue, optimize, and concretize rough research directions into problem, gap, insight, method, novelty, and evidence plans."
    exclude: "Does not rank or score multiple ideas as the main task."
    handoff: "ccf-idea-reviewer, ccf-literature-monitor, ccf-literature-searcher, ccf-pipeline-orchestrator, ccf-paper-writer"
  - name: ccf-idea-reviewer
    trigger: "Score, rank, compare, and triage early research ideas when the user explicitly asks for judgment."
    exclude: "Does not brainstorm directions, polish manuscripts, or optimize a single idea as the main task."
    handoff: "ccf-idea-optimizer, ccf-literature-monitor, ccf-literature-searcher"
  - name: ccf-literature-monitor
    trigger: "Monitor arXiv, OpenReview, venue feeds, labs, competitors, and new papers for overlap with a user's idea."
    exclude: "Does not replace deep related-work search, citation audit, or final idea scoring."
    handoff: "ccf-literature-searcher, ccf-idea-reviewer, ccf-idea-optimizer, ccf-paper-writer, ccf-integrity-auditor"
  - name: ccf-literature-searcher
    trigger: "Search and screen literature, related work, prior art, formulations, objectives, constraints, baselines, simulation settings, datasets, citation evidence, and research opportunity gaps."
    exclude: "Does not audit only already-cited references or act as a final idea kill gate."
    handoff: "ccf-idea-optimizer, ccf-idea-reviewer, ccf-mes-validation, ccf-complexity-upgrade, ccf-env-code-auditor, ccf-pipeline-orchestrator, ccf-paper-writer, ccf-integrity-auditor"
  - name: ccf-mes-validation
    trigger: "Use a complete paper/scenario document to build a minimal-but-complete MES, audit its environment, implement and audit the initial algorithm, and freeze the first anchor."
    exclude: "Do not start a post-anchor complexity upgrade or plan paper-range evidence."
    handoff: "ccf-literature-searcher, ccf-env-code-auditor, ccf-algorithm-code-auditor, ccf-complexity-upgrade"
  - name: ccf-complexity-upgrade
    trigger: "Use the current scenario, environment/algorithm implementation, and results to write an upgrade scenario document, modify and audit the existing environment, and modify/repair the algorithm."
    exclude: "Do not replace the requested scenario upgrade with an unrelated research problem or plan paper-range evidence."
    handoff: "ccf-env-code-auditor, ccf-algorithm-code-auditor, ccf-pipeline-orchestrator"
  - name: ccf-env-code-auditor
    trigger: "Use when the primary object under review is environment-to-document fidelity, representation of the scientific core and tradeoff, lightweight heuristic or random probes, or decision-time information."
    exclude: "Do not use when the primary object under review is algorithm design, algorithm-code semantics, convergence, hyperparameters, or algorithm performance."
    handoff: "ccf-mes-validation, ccf-complexity-upgrade, ccf-algorithm-code-auditor"
  - name: ccf-algorithm-code-auditor
    trigger: "Check algorithm equation-to-code fidelity, semantic correctness, execution-flow correctness, feasibility, reproducibility, and implementation behavior when invoked by ccf-mes-validation or ccf-complexity-upgrade."
    exclude: "Does not choose, implement, or repair the algorithm."
    handoff: "ccf-mes-validation, ccf-complexity-upgrade"
  - name: ccf-visual-composer
    trigger: "Compose, polish, generate, and QA publication-grade figures, tables, Python plotting code, creative data-analysis plots, captions, palettes, panel maps, and manuscript visual layout integration from supplied data/results."
    exclude: "Does not design experiments, invent results, write manuscript prose as the main task, or perform final submission compliance."
    handoff: "ccf-pipeline-orchestrator, ccf-paper-writer, ccf-integrity-auditor, ccf-submission-checker"
  - name: ccf-paper-to-exemplar
    trigger: "Convert PDF papers into writing exemplar cards and register reusable style references for ccf-paper-writer."
    exclude: "Does not write papers or perform review."
    handoff: "ccf-paper-writer"
  - name: ccf-paper-writer
    trigger: "Draft, revise, polish, compress, preserve source format during edits, create venue- and length-aware LaTeX manuscripts from ideas, and presentation-adapt paper text."
    exclude: "Does not perform full review, evidence audit, package check, or rebuttal."
    handoff: "ccf-literature-monitor, ccf-literature-searcher, ccf-pipeline-orchestrator, ccf-visual-composer, ccf-paper-reviewer, ccf-submission-checker, ccf-rebuttal-writer"
  - name: ccf-paper-reviewer
    trigger: "Review manuscripts scientifically and stylistically: scores, reviewer panel, AC/meta-review, paragraph logic, and format-facing risks."
    exclude: "Does not rewrite the manuscript or draft rebuttals."
    handoff: "ccf-paper-writer, ccf-pipeline-orchestrator, ccf-integrity-auditor, ccf-submission-checker, ccf-rebuttal-writer"
  - name: ccf-integrity-auditor
    trigger: "Audit paper conclusions, numbers, table/figure/text consistency, citation metadata, and citation-context support."
    exclude: "Does not replace full review or broad literature search."
    handoff: "ccf-paper-reviewer, ccf-paper-writer, ccf-visual-composer, ccf-literature-monitor, ccf-literature-searcher"
  - name: ccf-submission-checker
    trigger: "Check venue format, LaTeX/PDF package readiness, anonymity, metadata, supplementary files, and artifact/reproducibility readiness."
    exclude: "Does not polish manuscript content."
    handoff: "ccf-paper-writer, ccf-pipeline-orchestrator, ccf-visual-composer, ccf-paper-reviewer, ccf-rebuttal-writer"
  - name: ccf-rebuttal-writer
    trigger: "Write rebuttals, author responses, response letters, revision ledgers, and conservative resubmission plans."
    exclude: "Does not trigger for ordinary manuscript writing."
    handoff: "ccf-paper-writer, ccf-pipeline-orchestrator, ccf-submission-checker"
  - name: ccf-common
    trigger: "Maintain shared routing, trigger registry, handoff modes, source registry, privacy/evidence policy, and artifact contracts."
    exclude: "Not an ordinary research task skill."
    handoff: "All CCFA skills"
  - name: ccf-skill-forger
    trigger: "Maintain CCFA/Codex skills, routing, governance docs, generated SVG diagrams, validation, and releases."
    exclude: "Does not perform research writing, review, literature search, experiment design, or rebuttal."
    handoff: "ccf-common"
merged_runtime_entries:
  ccf-workflow-planner: ccf-pipeline-orchestrator
  ccf-env-design: ccf-mes-validation + ccf-complexity-upgrade
  ccf-algorithm-designer: ccf-mes-validation + ccf-complexity-upgrade
  ccf-experiment-debugger: ccf-mes-validation + ccf-complexity-upgrade
  ccf-experiment-designer: ccf-pipeline-orchestrator + ccf-paper-writer + ccf-visual-composer + ccf-integrity-auditor
  ccf-paper-compressor: ccf-paper-writer
  ccf-writing-reviewer: ccf-paper-reviewer
  ccf-citation-auditor: ccf-integrity-auditor
  ccf-figure-table-builder: ccf-pipeline-orchestrator + ccf-visual-composer
  ccf-artifact-packager: ccf-submission-checker
  ccf-venue-format-guide: ccf-submission-checker
  ccf-resubmission-adapter: ccf-rebuttal-writer
  ccf-paper-presenter: ccf-paper-writer
  ccf-doc-diagram-designer: ccf-skill-forger
